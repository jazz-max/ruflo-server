# Standalone: поднимает ruflo + postgres вместе
# Для встраивания в другие проекты см. README → "Встраивание как сервис"

services:
  ruflo:
    build: .
    # image: jazzmax/ruflo-server:latest
    restart: unless-stopped
    ports:
      - "${RUFLO_PORT:-3000}:${RUFLO_PORT:-3000}"
    environment:
      RUFLO_PORT: ${RUFLO_PORT:-3000}
      POSTGRES_HOST: ruflo-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ruflo}
      POSTGRES_USER: ${POSTGRES_USER:-ruflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruflo}
    depends_on:
      ruflo-db:
        condition: service_healthy

  ruflo-db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ruflo}
      POSTGRES_USER: ${POSTGRES_USER:-ruflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruflo}
    volumes:
      - ${POSTGRES_DATA:-ruflo-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruflo}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ruflo-pgdata:
    driver: local
