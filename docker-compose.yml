services:
  ruflo:
    build: .
    # image: yourname/ruflo-server:latest  # after publishing to Docker Hub
    container_name: ruflo-server
    restart: unless-stopped
    ports:
      - "${RUFLO_PORT:-3000}:${RUFLO_PORT:-3000}"
    environment:
      RUFLO_PORT: ${RUFLO_PORT:-3000}
      RUFLO_TRANSPORT: http
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ruflo}
      POSTGRES_USER: ${POSTGRES_USER:-ruflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruflo}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ruflo-net

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ruflo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ruflo}
      POSTGRES_USER: ${POSTGRES_USER:-ruflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruflo}
    volumes:
      - ${POSTGRES_DATA:-ruflo-pgdata}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruflo}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ruflo-net

volumes:
  ruflo-pgdata:
    driver: local

networks:
  ruflo-net:
    driver: bridge
